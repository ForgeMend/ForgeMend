<!-- ForgeMend Logo Concept 01 — The Block Mark
     A bold square monogram: "FM" on a navy background with an amber underline.
     Best use: App icon, favicon, profile picture, badge.
     Colors: Navy #1B2D5B | White | Amber #D97706
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="ForgeMend Block Mark Logo">
  <title>ForgeMend — The Block Mark</title>

  <!-- Background square with rounded corners -->
  <rect width="200" height="200" rx="28" fill="#1B2D5B"/>

  <!-- Inner depth layer -->
  <rect x="8" y="8" width="184" height="184" rx="22" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- "F" letterform -->
  <rect x="42" y="52" width="11"  height="80"  rx="3" fill="#FFFFFF"/>
  <rect x="42" y="52" width="52"  height="11"  rx="3" fill="#FFFFFF"/>
  <rect x="42" y="89" width="42"  height="10"  rx="3" fill="#FFFFFF"/>

  <!-- "M" letterform -->
  <rect x="108" y="52" width="11" height="80"  rx="3" fill="#FFFFFF"/>
  <rect x="147" y="52" width="11" height="80"  rx="3" fill="#FFFFFF"/>
  <!-- M center strokes -->
  <polygon points="108,52 119,52 134,82 149,52 158,52 158,60 143,90 134,73 125,90 108,60" fill="#FFFFFF"/>

  <!-- Amber accent bar -->
  <rect x="38" y="147" width="124" height="7" rx="3.5" fill="#D97706"/>

  <!-- "FORGEMEND" label -->
  <text
    x="100" y="178"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="12"
    fill="rgba(255,255,255,0.45)"
    text-anchor="middle"
    letter-spacing="4"
  >FORGEMEND</text>
</svg>
