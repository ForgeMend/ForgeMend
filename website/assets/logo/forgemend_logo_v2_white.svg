<!-- ForgeMend Primary Logo v2 — White (for dark/navy backgrounds)
     Icon: Geometric anvil (white) + amber data trend
     Wordmark: Forge (white) + Mend (sky blue), Montserrat 800
     Use on: Navy #1B2D5B, Dark Navy #0F1D3D, and dark section backgrounds
     version: 2.0
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 64" width="310" height="64" role="img" aria-label="ForgeMend">
  <title>ForgeMend</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- ── ANVIL ICON MARK ───────────────────────────────── -->

  <!-- Horn -->
  <path
    d="M 10,27 C 5,27 1,30 1,33 C 1,36 5,39 10,39 Z"
    fill="#FFFFFF"
  />

  <!-- Top body -->
  <rect x="10" y="26" width="44" height="14" rx="2.5" fill="#FFFFFF"/>

  <!-- Amber working-surface highlight -->
  <rect x="10" y="26" width="44" height="3.5" rx="1.5" fill="#F59E0B" opacity="0.9"/>

  <!-- Waist -->
  <rect x="21" y="40" width="18" height="8" fill="#FFFFFF"/>

  <!-- Base -->
  <rect x="12" y="48" width="36" height="12" rx="3.5" fill="#FFFFFF"/>

  <!-- Amber rising data trend line -->
  <polyline
    points="40,22 47,15 54,8"
    fill="none"
    stroke="#F59E0B"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.85"
  />

  <!-- Amber data nodes -->
  <circle cx="40" cy="22" r="2.8" fill="#F59E0B"/>
  <circle cx="47" cy="15" r="2.2" fill="#F59E0B"/>
  <circle cx="54" cy="8"  r="1.6" fill="#F59E0B"/>

  <!-- ── WORDMARK ──────────────────────────────────────── -->

  <!-- "Forge" — White -->
  <text
    x="74" y="44"
    font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#FFFFFF"
    letter-spacing="-0.6"
  >Forge</text>

  <!-- "Mend" — Sky Blue (readable on dark) -->
  <text
    x="182" y="44"
    font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#93C5FD"
    letter-spacing="-0.6"
  >Mend</text>

</svg>
