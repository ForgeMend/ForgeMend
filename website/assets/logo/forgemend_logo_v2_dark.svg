<!-- ForgeMend Primary Logo v2 — Dark (for light/white backgrounds)
     Icon: Geometric anvil (navy) + rising amber data trend
     Wordmark: Forge (navy) + Mend (steel blue), Montserrat 800
     Use on: white, light gray, and neutral light backgrounds
     version: 2.0
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 64" width="310" height="64" role="img" aria-label="ForgeMend">
  <title>ForgeMend</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
    </style>
  </defs>

  <!-- ── ANVIL ICON MARK ───────────────────────────────── -->

  <!-- Horn (left protrusion) -->
  <path
    d="M 10,27 C 5,27 1,30 1,33 C 1,36 5,39 10,39 Z"
    fill="#1B2D5B"
  />

  <!-- Top body -->
  <rect x="10" y="26" width="44" height="14" rx="2.5" fill="#1B2D5B"/>

  <!-- Amber working-surface highlight (forge heat) -->
  <rect x="10" y="26" width="44" height="3.5" rx="1.5" fill="#D97706" opacity="0.85"/>

  <!-- Waist -->
  <rect x="21" y="40" width="18" height="8" fill="#1B2D5B"/>

  <!-- Base -->
  <rect x="12" y="48" width="36" height="12" rx="3.5" fill="#1B2D5B"/>

  <!-- Amber rising data trend line -->
  <polyline
    points="40,22 47,15 54,8"
    fill="none"
    stroke="#D97706"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.8"
  />

  <!-- Amber data nodes (rising = improving data quality) -->
  <circle cx="40" cy="22" r="2.8" fill="#D97706"/>
  <circle cx="47" cy="15" r="2.2" fill="#D97706"/>
  <circle cx="54" cy="8"  r="1.6" fill="#D97706"/>

  <!-- ── WORDMARK ──────────────────────────────────────── -->

  <!-- "Forge" — Navy -->
  <text
    x="74" y="44"
    font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#1B2D5B"
    letter-spacing="-0.6"
  >Forge</text>

  <!-- "Mend" — Steel Blue -->
  <text
    x="182" y="44"
    font-family="'Montserrat', 'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="36"
    fill="#2D6A9F"
    letter-spacing="-0.6"
  >Mend</text>

</svg>
